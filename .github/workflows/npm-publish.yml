# Publishes to npm when changes land on main (for example after a PR is merged).
# Uses npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN in GitHub secrets.
#
# Trusted publishing requires npm CLI >= 11.5.1 and Node >= 22.14.0 (npm docs).
# Use Node 24 in CI so the bundled npm always supports OIDC; older npm versions
# can fail OIDC and surface a misleading 404 on `npm publish`.
#
# One-time setup (package owner on npmjs.com):
# 1. Create the package on npm (same name as package.json) if it does not exist yet.
# 2. Package → Settings → Trusted publishing → GitHub Actions
#    - Repository and workflow file name must match exactly: npm-publish.yml
#    - If this job sets `environment: <name>` on npmjs.com, the Environment name
#      field must match exactly; leave it blank only when the workflow has no
#      `environment:` key on the publish job.
# 3. Settings → Publishing access → enable "Require 2FA and disallow tokens" (recommended)
#
# Optional GitHub hardening: add `environment: npm` to the publish job and create
# an "npm" environment (Settings → Environments) with required reviewers so each
# release needs an explicit approval before `npm publish` runs.
name: Publish to npm

on:
  push:
    branches: [main]

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Align with npm Trusted Publishing docs (bundled npm supports OIDC).
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Print Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check if version is already published
        id: publish_check
        run: |
          set -euo pipefail
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "publish=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping publish: ${NAME}@${VERSION} is already on the registry."
          else
            echo "publish=true" >> "${GITHUB_OUTPUT}"
            echo "Will publish ${NAME}@${VERSION} (not found on registry)."
          fi

      - name: Publish to npm
        if: steps.publish_check.outputs.publish == 'true'
        # OIDC via id-token: write; npm exchanges the GitHub ID token automatically.
        # Provenance is generated automatically for public repos (npm docs).
        run: npm publish --access public
