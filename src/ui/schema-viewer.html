<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schema Viewer - MSSQL MCP</title>
    <style>
      :root {
        --color-bg: var(--color-background-primary, #ffffff);
        --color-text: var(--color-text-primary, #1a1a1a);
        --color-border: var(--color-border-primary, #e0e0e0);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 12px;
        font-family: var(--font-family-sans, system-ui, sans-serif);
        font-size: 13px;
        background: var(--color-bg);
        color: var(--color-text);
      }
      .header { margin-bottom: 12px; }
      .status { color: var(--color-text-secondary, #666); }
      .error { color: var(--color-text-error, #c00); }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--color-border);
      }
      th { font-weight: 600; background: var(--color-border); }
      .btn {
        padding: 6px 12px;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        background: var(--color-bg);
        color: var(--color-text);
        cursor: pointer;
        font-size: 12px;
        margin-top: 8px;
      }
      .btn:hover { background: var(--color-border); }
      .empty { padding: 24px; text-align: center; color: var(--color-text-secondary); }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="status" id="status">Loading...</span>
    </div>
    <div id="content"></div>
    <button class="btn" id="view-data-btn" style="display:none">View sample data</button>
    <script type="module" src="./schema-viewer.ts"></script>
  </body>
</html>
