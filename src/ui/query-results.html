<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Query Results - MSSQL MCP</title>
    <style>
      :root {
        --color-bg: var(--color-background-primary, #ffffff);
        --color-text: var(--color-text-primary, #1a1a1a);
        --color-border: var(--color-border-primary, #e0e0e0);
        --color-accent: var(--color-accent-primary, #0066cc);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 12px;
        font-family: var(--font-family-sans, system-ui, sans-serif);
        font-size: 13px;
        background: var(--color-bg);
        color: var(--color-text);
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      .status { color: var(--color-text-secondary, #666); }
      .error { color: var(--color-text-error, #c00); }
      .btn {
        padding: 6px 12px;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        background: var(--color-bg);
        color: var(--color-text);
        cursor: pointer;
        font-size: 12px;
      }
      .btn:hover { background: var(--color-border); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        max-height: 400px;
        overflow-y: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th, td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--color-border);
      }
      th {
        background: var(--color-border);
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 1;
        cursor: pointer;
        user-select: none;
      }
      th:hover { background: var(--color-text-secondary, #999); color: var(--color-bg); }
      tr:hover { background: rgba(0,0,0,0.03); }
      .empty { padding: 24px; text-align: center; color: var(--color-text-secondary); }
      .loading { padding: 24px; text-align: center; }
      .filter-row { margin-bottom: 8px; }
      .filter-row input {
        padding: 6px 10px;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        width: 200px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <span class="status" id="status">Loading...</span>
      </div>
      <div>
        <input type="text" id="filter" class="filter-row" placeholder="Filter rows..." style="display:none" />
        <button class="btn" id="refresh-btn" disabled>Refresh</button>
      </div>
    </div>
    <div class="table-wrap">
      <div id="content">
        <div class="loading">Waiting for query results...</div>
      </div>
    </div>
    <script type="module" src="./query-results.ts"></script>
  </body>
</html>
